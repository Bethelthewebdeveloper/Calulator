<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .converter-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 6px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #495057;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h1>Currency Converter</h1>
        
        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Enter amount" value="1">
        </div>

        <div class="form-group">
            <label for="fromCurrency">From</label>
            <select id="fromCurrency">
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
                <option value="NGN">NGN - Nigerian Naira</option>
            </select>
        </div>

        <div class="form-group">
            <label for="toCurrency">To</label>
            <select id="toCurrency">
                <option value="NGN" selected>NGN - Nigerian Naira</option>
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
            </select>
        </div>

        <button onclick="handleConversion()">Convert</button>

        <div class="result-box" id="result">
            Converted Amount will show here
        </div>
    </div>

    <script>
        function convert(amount, fromCurrency, toCurrency) {
            let rate;

            // If currencies are identical
            if (fromCurrency === toCurrency) {
                return amount;
            }

            // USD / NGN Conversions
            if (fromCurrency === "USD" && toCurrency === "NGN") {
                rate = 1500;
            } else if (fromCurrency === "NGN" && toCurrency === "USD") {
                rate = 1 / 1500;
            } 
            
            // EUR / USD Conversions (Standard rates adjusted for logic)
            else if (fromCurrency === "EUR" && toCurrency === "USD") {
                rate = 1.08; 
            } else if (fromCurrency === "USD" && toCurrency === "EUR") {
                rate = 1 / 1.08;
            } 
            
            // EUR / NGN Conversions
            else if (fromCurrency === "EUR" && toCurrency === "NGN") {
                rate = 1620;
            } else if (fromCurrency === "NGN" && toCurrency === "EUR") {
                rate = 1 / 1620;
            } 
            
            else {
                return "Conversion Not Supported.";
            }

            return amount * rate;
        } 

        function handleConversion() {
            // Grab values from DOM elements
            const amount = Number(document.getElementById('amount').value);
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;
            const resultBox = document.getElementById('result');

            if (isNaN(amount) || amount <= 0) {
                resultBox.innerText = "Please enter a valid amount";
                return;
            }

            const result = convert(amount, fromCurrency, toCurrency);

            // Format output nicely based on whether it is a number or error string
            if (typeof result === 'number') {
                resultBox.innerText = `${amount} ${fromCurrency} = ${result.toFixed(2)} ${toCurrency}`;
            } else {
                resultBox.innerText = result;
            }
        }
    </script>
</body>
</html>
