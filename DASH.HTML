<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#f85a5a] text-white flex flex-col justify-between p-6 shrink-0">
        <div>
            <div class="flex flex-col items-center text-center mb-8">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" alt="Profile" class="w-20 h-20 rounded-full border-4 border-white/20 object-cover mb-3">
                <h2 class="font-bold text-lg">Sundar Gurung</h2>
                <p class="text-xs text-white/80">sundargurung360@gmail.com</p>
            </div>
            
            <nav class="space-y-2">
                <a href="#" class="flex items-center gap-4 bg-white text-[#f85a5a] px-4 py-3 rounded-xl font-semibold shadow-sm transition">
                    <i class="fa-solid fa-grid-2"></i> Dashboard
                </a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 font-medium transition">
                    <i class="fa-solid fa-circle-exclamation"></i> Vital Task
                </a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 font-medium transition">
                    <i class="fa-solid fa-list-check"></i> My Task
                </a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 font-medium transition">
                    <i class="fa-solid fa-tags"></i> Task Categories
                </a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 font-medium transition">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 font-medium transition">
                    <i class="fa-solid fa-circle-question"></i> Help
                </a>
            </nav>
        </div>

        <button class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/10 font-medium transition text-left cursor-pointer">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="bg-white border-b border-slate-100 px-8 py-4 flex justify-between items-center shrink-0">
            <div class="relative w-96">
                <input type="text" id="searchInput" placeholder="Search your task here..." class="w-full bg-slate-50 pl-4 pr-12 py-2.5 rounded-xl border border-slate-200 outline-none focus:border-[#f85a5a] transition text-sm">
                <button class="absolute right-2 top-1.5 bottom-1.5 bg-[#f85a5a] text-white px-3 rounded-lg flex items-center justify-center text-xs hover:bg-[#e04f4f] transition">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="flex items-center gap-6">
                <button class="text-slate-400 hover:text-slate-600 relative"><i class="fa-regular fa-bell text-lg"></i></button>
                <button class="text-slate-400 hover:text-slate-600"><i class="fa-regular fa-calendar text-lg"></i></button>
                <div class="text-right">
                    <div class="text-xs font-semibold text-slate-400">Tuesday</div>
                    <div class="text-sm font-bold text-slate-700">20/06/2023</div>
                </div>
            </div>
        </header>

        <main class="flex-1 p-8 overflow-y-auto space-y-6">
            
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-slate-800">Welcome back, Sundar 👋</h1>
                <div class="flex items-center gap-3">
                    <div class="flex -space-x-2">
                        <img class="w-8 h-8 rounded-full border-2 border-white object-cover" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=80&q=80">
                        <img class="w-8 h-8 rounded-full border-2 border-white object-cover" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=80&q=80">
                        <img class="w-8 h-8 rounded-full border-2 border-white object-cover" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=80&q=80">
                    </div>
                    <button id="openModalBtn" class="bg-rose-50 text-rose-500 hover:bg-rose-100 text-xs font-bold px-4 py-2 rounded-xl border border-rose-100 transition cursor-pointer">
                        + Add task
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                
                <div class="lg:col-span-2 space-y-6 bg-white p-6 rounded-2xl border border-slate-100 shadow-xs">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-regular fa-clipboard text-[#f85a5a]"></i> To-Do</h3>
                        <span class="text-xs text-slate-400">20 June • Today</span>
                    </div>
                    
                    <div id="todoContainer" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                        </div>
                </div>

                <div class="space-y-6">
                    
                    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs">
                        <h3 class="font-bold text-slate-800 mb-6">Task Status</h3>
                        <div class="grid grid-cols-3 gap-2 text-center">
                            <div class="flex flex-col items-center">
                                <div class="relative w-16 h-16 flex items-center justify-center">
                                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path class="text-slate-100" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                        <path id="ringCompleted" class="text-emerald-500 transition-all duration-500" stroke-dasharray="0, 100" stroke-width="3" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831"/>
                                    </svg>
                                    <span id="textCompleted" class="absolute font-bold text-xs">0%</span>
                                </div>
                                <span class="text-[11px] font-semibold text-slate-500 mt-2 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Completed</span>
                            </div>

                            <div class="flex flex-col items-center">
                                <div class="relative w-16 h-16 flex items-center justify-center">
                                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path class="text-slate-100" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                        <path id="ringProgress" class="text-blue-600 transition-all duration-500" stroke-dasharray="0, 100" stroke-width="3" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831"/>
                                    </svg>
                                    <span id="textProgress" class="absolute font-bold text-xs">0%</span>
                                </div>
                                <span class="text-[11px] font-semibold text-slate-500 mt-2 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-blue-600"></span> In Progress</span>
                            </div>

                            <div class="flex flex-col items-center">
                                <div class="relative w-16 h-16 flex items-center justify-center">
                                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path class="text-slate-100" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                        <path id="ringNotStarted" class="text-rose-500 transition-all duration-500" stroke-dasharray="0, 100" stroke-width="3" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831"/>
                                    </svg>
                                    <span id="textNotStarted" class="absolute font-bold text-xs">0%</span>
                                </div>
                                <span class="text-[11px] font-semibold text-slate-500 mt-2 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-rose-500"></span> Not Started</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs">
                        <h3 class="font-bold text-slate-800 border-b border-slate-100 pb-3 mb-4 flex items-center gap-2"><i class="fa-regular fa-square-check text-emerald-500"></i> Completed Task</h3>
                        <div id="completedContainer" class="space-y-4 max-h-[350px] overflow-y-auto pr-1">
                            </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs hidden items-center justify-center z-50 animate-fade-in">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800">Add New Task</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 text-lg cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="taskForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Task Title</label>
                    <input type="text" id="taskTitle" required class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-[#f85a5a] outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Description</label>
                    <textarea id="taskDesc" rows="3" required class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-[#f85a5a] outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Status</label>
                        <select id="taskStatus" class="w-full border border-slate-200 bg-white rounded-xl px-3 py-2 text-sm outline-none">
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Decorative Image</label>
                        <select id="taskImage" class="w-full border border-slate-200 bg-white rounded-xl px-3 py-2 text-sm outline-none">
                            <option value="none">None</option>
                            <option value="party">Party / Social</option>
                            <option value="work">Laptop / Work</option>
                            <option value="dog">Animal / Dog</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full bg-[#f85a5a] text-white py-2.5 rounded-xl font-bold hover:bg-[#e04f4f] transition cursor-pointer">Save Task</button>
            </form>
        </div>
    </div>

    <script>
        // Preset Stock Mock Images mapping
        const imageMap = {
            none: "",
            party: "https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&w=150&q=80",
            work: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=150&q=80",
            dog: "https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&w=150&q=80"
        };

        // Seed data initialization 
        let defaultTasks = [
            { id: 1, title: "Attend Nischal's Birthday Party", desc: "Buy gifts on the way and pick up cake from the bakery. (6 PM | Fresh Elements)", priority: "Moderate", status: "Not Started", imgKey: "party" },
            { id: 2, title: "Landing Page Design for TravelDays", desc: "Get the work done by EOD and discuss with client before leaving. (4 PM | Meeting Room)", priority: "Moderate", status: "In Progress", imgKey: "work" },
            { id: 3, title: "Walk the dog", desc: "Take the dog to the park and bring treats as well.", priority: "Moderate", status: "Completed", imgKey: "dog" }
        ];

        // Read LocalStorage or fallback to seed data
        let tasks = JSON.parse(localStorage.getItem('dashboard_tasks')) || defaultTasks;

        // Modal Elements Interaction
        const taskModal = document.getElementById('taskModal');
        document.getElementById('openModalBtn').addEventListener('click', () => taskModal.style.display = 'flex');
        document.getElementById('closeModalBtn').axddEventListener('click', () => taskModal.style.display = 'none');

        // Form Submit Implementation
        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newTask = {
                id: Date.now(),
                title: document.getElementById('taskTitle').value,
                desc: document.getElementById('taskDesc').value,
                priority: "Moderate",
                status: document.getElementById('taskStatus').value,
                imgKey: document.getElementById('taskImage').value
            };
            tasks.push(newTask);
            syncAppState();
            taskModal.style.display = 'none';
            document.getElementById('taskForm').reset();
        });

        // Toggle Status via Direct Click Interaction on Card Circle Checkbox
        function cycleTaskStatus(id) {
            tasks = tasks.map(task => {
                if(task.id === id) {
                    if(task.status === "Not Started") task.status = "In Progress";
                    else if(task.status === "In Progress") task.status = "Completed";
                    else task.status = "Not Started";
                }
                return task;
            });
            syncAppState();
        }

        // Search Bar Event Hook
        document.getElementById('searchInput').addEventListener('input', () => renderDashboard());

        // Core Synchronizer
        function syncAppState() {
            localStorage.setItem('dashboard_tasks', JSON.stringify(tasks));
            renderDashboard();
        }

        // Render Pipelines
        function renderDashboard() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const todoContainer = document.getElementById('todoContainer');
            const completedContainer = document.getElementById('completedContainer');
            
            // Clean active views
            todoContainer.innerHTML = "";
            completedContainer.innerHTML = "";

            let counts = { "Not Started": 0, "In Progress": 0, "Completed": 0 };

            tasks.forEach(task => {
                counts[task.status]++;

                // Process keyword filter mapping
                if(query && !task.title.toLowerCase().includes(query) && !task.desc.toLowerCase().includes(query)) return;

                // Build clean dynamic HTML structures
                const imgMarkup = task.imgKey !== 'none' ? `<img src="${imageMap[task.imgKey]}" class="w-16 h-16 object-cover rounded-xl shrink-0 border border-slate-100">` : '';
                
                let borderColor = "border-rose-400";
                if(task.status === "In Progress") borderColor = "border-blue-500";
                if(task.status === "Completed") borderColor = "border-emerald-500";

                const cardHTML = `
                    <div class="border border-slate-100 rounded-xl p-4 flex gap-4 items-start justify-between bg-slate-50/50 hover:bg-slate-50 transition">
                        <div class="flex gap-3 items-start">
                            <button onclick="cycleTaskStatus(${task.id})" class="w-4 h-4 rounded-full border-2 ${borderColor} mt-1 cursor-pointer flex items-center justify-center shrink-0">
                                ${task.status === 'Completed' ? '<span class="w-2 h-2 rounded-full bg-emerald-500"></span>' : ''}
                            </button>
                            <div>
                                <h4 class="font-bold text-sm text-slate-800 ${task.status === 'Completed' ? 'line-through text-slate-400' : ''}">${task.title}</h4>
                                <p class="text-xs text-slate-500 mt-1 leading-relaxed">${task.desc}</p>
                                <div class="flex items-center gap-4 mt-3 text-[10px] font-bold tracking-wide">
                                    <span class="text-slate-400">Priority: <span class="text-blue-500">${task.priority}</span></span>
                                    <span class="text-slate-400">Status: <span class="${task.status==='Completed'?'text-emerald-500':task.status==='In Progress'?'text-blue-600':'text-rose-500'}">${task.status}</span></span>
                                </div>
                            </div>
                        </div>
                        ${imgMarkup}
                    </div>
                `;

                if(task.status === 'Completed') {
                    completedContainer.innerHTML += cardHTML;
                } else {
                    todoContainer.innerHTML += cardHTML;
                }
            });

            // Update Graphical Charts Values
            const total = tasks.length || 1;
            updateRing("Completed", (counts["Completed"] / total) * 100);
            updateRing("Progress", (counts["In Progress"] / total) * 100);
            updateRing("Not Started", (counts["Not Started"] / total) * 100);
        }

        function updateRing(idKey, percentage) {
            const roundedVal = Math.round(percentage);
            document.getElementById(`text${idKey}`).innerText = `${roundedVal}%`;
            document.getElementById(`ring${idKey}`).setAttribute("stroke-dasharray", `${roundedVal}, 100`);
        }

        // Initialize App on Document Load
        renderDashboard();
    </script>
</body>
</html>
